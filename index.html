<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>M&M Beach Vôlei</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  overflow-x: hidden;
}

/* 🖼️ FUNDO COM BLUR SUAVE */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background-image: url("WhatsApp%20Image%202026-04-21%20at%2021.03.24.jpeg");
  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;

  filter: blur(4px);          /* 🔥 blur leve */
  transform: scale(1.05);     /* evita bordas do blur */

  z-index: -2;
}

/* 🌑 CAMADA DE TRANSPARÊNCIA */
body::after {
  content: "";
  position: fixed;
  inset: 0;

  background: rgba(0,0,0,0.3); /* 🔥 leve transparência */

  z-index: -1;
}

/* 🖼️ LATERAIS (SEM ALTERAÇÃO) */
.lateral {
  position: fixed;
  top: 0;
  height: 100%;
  z-index: 0;
}

.lateral.left { left: 0; }
.lateral.right { right: 0; }

/* container */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
  position: relative;
  z-index: 1;
}

/* título */
.logo {
  font-size: 34px;
  font-weight: bold;
  text-shadow: 2px 2px 6px black;
}

/* bola animada */
.bola {
  font-size: 40px;
  animation: quicar 1s infinite ease-in-out;
}

@keyframes quicar {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
}

/* cards */
.card {
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

/* inputs */
input, select, button {
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

input, select {
  width: 200px;
}

/* botões */
button {
  cursor: pointer;
  font-weight: bold;
}

.sortear {
  background: gold;
  color: black;
}

.reset {
  background: red;
  color: white;
}

/* times */
#times {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

/* animação */
.time {
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 10px;
  animation: aparecer 0.4s ease;
}

@keyframes aparecer {
  from {opacity:0; transform:scale(0.8);}
  to {opacity:1; transform:scale(1);}
}

/* ranking */
.ranking {
  margin-top: 20px;
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- laterais -->
<img src="MeM.jpg" class="lateral left">
<img src="MeM.jpg" class="lateral right">

<div class="container">

<div class="logo">🏐 M&M VOLEI</div>
<div class="bola">🏐</div>

<div class="card">
  <input type="text" id="nome" placeholder="Nome do jogador">

  <select id="genero">
    <option value="M">Masculino</option>
    <option value="F">Feminino</option>
  </select>

  <select id="nivel">
    <option value="1">Nível 1</option>
    <option value="2">Nível 2</option>
    <option value="3">Nível 3</option>
    <option value="4">Nível 4</option>
    <option value="5">Nível 5</option>
  </select>

  <br>
  <button onclick="adicionarJogador()">+ Adicionar</button>
</div>

<div class="card">
  <h2>Jogadores</h2>
  <ul id="lista"></ul>
</div>

<button class="sortear" onclick="sortearTimes()">Sortear</button>
<button class="reset" onclick="resetarTimes()">Resetar</button>

<div id="times"></div>
<div id="ranking" class="ranking"></div>

</div>

<script>
let jogadores=[];

function salvarJogadores(){
  localStorage.setItem("jogadores",JSON.stringify(jogadores));
}

function carregarJogadores(){
  const dados=localStorage.getItem("jogadores");
  if(dados){
    jogadores=JSON.parse(dados);
    atualizarLista();
  }
}

function adicionarJogador(){
  const nome=document.getElementById("nome").value.trim();
  const genero=document.getElementById("genero").value;
  const nivel=parseInt(document.getElementById("nivel").value);

  if(!nome) return alert("Digite o nome!");

  jogadores.push({nome,genero,nivel});
  atualizarLista();
  salvarJogadores();

  document.getElementById("nome").value="";
}

function atualizarLista(){
  const lista=document.getElementById("lista");
  lista.innerHTML="";

  jogadores.forEach((j,i)=>{
    const li=document.createElement("li");
    li.innerHTML=`${j.nome} (N${j.nivel}) 
    <button onclick="removerJogador(${i})">❌</button>`;
    lista.appendChild(li);
  });
}

function removerJogador(i){
  jogadores.splice(i,1);
  atualizarLista();
  salvarJogadores();
}

function resetarTimes(){
  document.getElementById("times").innerHTML="";
  document.getElementById("ranking").innerHTML="";
}

function sortearTimes(){
  let homens=jogadores.filter(j=>j.genero==="M");
  let mulheres=jogadores.filter(j=>j.genero==="F");

  let times=[];

  homens.sort(()=>Math.random()-0.5);
  mulheres.sort(()=>Math.random()-0.5);

  while(homens.length || mulheres.length){
    let time=[];

    for(let i=0;i<2 && homens.length;i++) time.push(homens.pop());
    for(let i=0;i<2 && mulheres.length;i++) time.push(mulheres.pop());

    while(time.length<4 && (homens.length || mulheres.length)){
      if(homens.length) time.push(homens.pop());
      else time.push(mulheres.pop());
    }

    times.push(time);
  }

  mostrarTimes(times);
  gerarRanking(times);
}

function mostrarTimes(times){
  const div=document.getElementById("times");
  div.innerHTML="";

  times.forEach((time,i)=>{
    let html=`<div class="time"><h3>Time ${i+1}</h3>`;
    time.forEach(j=>{
      html+=`<p>${j.nome} (N${j.nivel})</p>`;
    });
    html+=`</div>`;
    div.innerHTML+=html;
  });
}

function gerarRanking(times){
  let ranking=[];

  times.forEach((time,i)=>{
    let total=time.reduce((a,j)=>a+j.nivel,0);
    ranking.push({time:i+1,pontos:total});
  });

  ranking.sort((a,b)=>b.pontos-a.pontos);

  const div=document.getElementById("ranking");
  div.innerHTML="<h3>Ranking</h3>";

  ranking.forEach((r,i)=>{
    div.innerHTML+=`<p>${i+1}º - Time ${r.time} (${r.pontos})</p>`;
  });
}

carregarJogadores();
</script>

</body>
</html>
