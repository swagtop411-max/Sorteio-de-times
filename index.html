<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>M&M Beach Vôlei</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
}

/* 🌅 FUNDO ESTILO PRAIA */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
    url("MeM.jpg");

  background-position: center;
  background-size: cover;
  background-repeat: no-repeat;

  z-index: -1;
}

/* container */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

/* título */
.logo {
  font-size: 34px;
  font-weight: bold;
  color: #facc15;
  text-shadow: 0 0 10px rgba(255,200,0,0.6);
}

.subtitulo {
  margin-bottom: 20px;
  color: #fde68a;
}

/* 🏐 CARDS ESTILO AREIA */
.card {
  background: rgba(255, 183, 77, 0.15);
  border: 2px solid #facc15;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 15px;
  backdrop-filter: blur(6px);
}

/* inputs */
input, select, button {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

input, select {
  width: 200px;
}

/* 🔥 BOTÕES */
button {
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

/* adicionar */
button {
  background: linear-gradient(45deg, #22c55e, #4ade80);
  color: white;
}

button:hover {
  transform: scale(1.05);
}

/* sortear */
.sortear {
  background: linear-gradient(45deg, #f59e0b, #facc15);
  color: black;
  font-size: 18px;
}

/* reset */
.reset {
  background: linear-gradient(45deg, #ef4444, #f87171);
}

/* times */
#times {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

/* 🏐 CARD TIME */
.time {
  background: rgba(0, 0, 0, 0.6);
  border: 2px solid #facc15;
  padding: 10px;
  border-radius: 12px;
}

.time h3 {
  color: #facc15;
}

/* lista */
li {
  margin: 5px 0;
}

li button {
  margin-left: 10px;
  background: #ef4444;
  border-radius: 6px;
}

/* responsivo */
@media (max-width: 600px) {
  input, select {
    width: 90%;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🏐 BEACH VÔLEI M&M</div>
<div class="subtitulo">Sorteio de Times na Areia</div>

<!-- cadastro -->
<div class="card">
  <input type="text" id="nome" placeholder="Nome do jogador">

  <select id="genero">
    <option value="M">👨 Masculino</option>
    <option value="F">👩 Feminino</option>
  </select>

  <select id="nivel">
    <option value="1">Nível 1</option>
    <option value="2">Nível 2</option>
    <option value="3">Nível 3</option>
    <option value="4">Nível 4</option>
    <option value="5">Nível 5</option>
  </select>

  <br>
  <button onclick="adicionarJogador()">+ Adicionar</button>
</div>

<!-- lista -->
<div class="card">
  <h2>👥 Jogadores</h2>
  <ul id="lista"></ul>
</div>

<button class="sortear" onclick="sortearTimes()">🎯 Sortear Times</button>
<button class="reset" onclick="resetarTimes()">🔄 Resetar</button>

<div id="times"></div>

</div>

<script>
let jogadores = [];

function salvarJogadores() {
  localStorage.setItem("jogadores", JSON.stringify(jogadores));
}

function carregarJogadores() {
  const dados = localStorage.getItem("jogadores");
  if (dados) {
    jogadores = JSON.parse(dados);
    atualizarLista();
  }
}

function adicionarJogador() {
  const nomeInput = document.getElementById("nome");
  const genero = document.getElementById("genero").value;
  const nivel = parseInt(document.getElementById("nivel").value);

  const nome = nomeInput.value.trim();
  if (!nome) return alert("Digite o nome!");

  jogadores.push({ nome, genero, nivel });

  atualizarLista();
  salvarJogadores();

  nomeInput.value = "";
  nomeInput.focus();
}

function atualizarLista() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  jogadores.forEach((j, i) => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${j.nome} - ${j.genero} - Nível ${j.nivel}
      <button onclick="removerJogador(${i})">❌</button>
    `;
    lista.appendChild(li);
  });
}

function removerJogador(i) {
  jogadores.splice(i, 1);
  atualizarLista();
  salvarJogadores();
}

function resetarTimes() {
  document.getElementById("times").innerHTML = "";
}

/* sorteio com sobra */
function sortearTimes() {
  let homens = jogadores.filter(j => j.genero === "M");
  let mulheres = jogadores.filter(j => j.genero === "F");

  let times = [];

  homens.sort(() => Math.random() - 0.5);
  mulheres.sort(() => Math.random() - 0.5);

  while (homens.length > 0 || mulheres.length > 0) {
    let time = [];

    for (let i = 0; i < 2 && homens.length > 0; i++) {
      time.push(homens.pop());
    }

    for (let i = 0; i < 2 && mulheres.length > 0; i++) {
      time.push(mulheres.pop());
    }

    while (time.length < 4 && (homens.length > 0 || mulheres.length > 0)) {
      if (homens.length > 0) {
        time.push(homens.pop());
      } else {
        time.push(mulheres.pop());
      }
    }

    times.push(time);
  }

  mostrarTimes(times);
}

function mostrarTimes(times) {
  const div = document.getElementById("times");
  div.innerHTML = "";

  times.forEach((time,i)=>{
    let html = `<div class="time"><h3>🏐 Time ${i+1}</h3>`;

    time.forEach(j=>{
      html += `<p>${j.nome} (N${j.nivel})</p>`;
    });

    html += `</div>`;
    div.innerHTML += html;
  });
}

carregarJogadores();
</script>

</body>
</html>
