<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>M&M Vôlei PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
}

/* laterais */
.lateral{
  position:fixed;
  top:0;
  height:100%;
  z-index:0;
}
.left{left:0;}
.right{right:0;}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
  text-align:center;
  position:relative;
  z-index:1;
}

.card{
  background:rgba(0,0,0,0.75);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

li, p{
  color:#fff;
  font-weight:600;
  text-shadow:0 0 6px rgba(0,0,0,0.8);
}

.time h3{
  color:#facc15;
}

input,select,button{
  margin:5px;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{cursor:pointer;}
.sortear{background:gold;color:black;}
.reset{background:red;color:white;}

.remove{
  background:#ef4444;
  color:white;
  margin-left:10px;
  padding:4px 8px;
  border-radius:6px;
}

#times{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.time{
  background:rgba(0,0,0,0.75);
  padding:10px;
  border-radius:10px;
}

.fila{
  margin-top:20px;
  background:rgba(255,255,255,0.15);
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<img src="MeM.jpg" class="lateral left">
<img src="MeM.jpg" class="lateral right">

<div class="container">

<h2>🏐 M&M VOLEI PRO MAX</h2>

<div class="card">
<input id="nome" placeholder="Nome">
<select id="genero">
<option value="M">Masculino</option>
<option value="F">Feminino</option>
</select>
<select id="nivel">
<option value="1">N1</option>
<option value="2">N2</option>
<option value="3">N3</option>
<option value="4">N4</option>
<option value="5">N5</option>
</select>
<button onclick="add()">Adicionar</button>
</div>

<div class="card">
<ul id="lista"></ul>
</div>

<button class="sortear" onclick="reorganizar()">🎮 Refazer Equilibrado</button>
<button class="reset" onclick="resetar()">Resetar</button>

<canvas id="grafico"></canvas>

<div id="times"></div>
<div id="fila" class="fila"></div>

</div>

<script>
let jogadores=[];
let fila=[];
let times=[];

/* salvar */
function salvar(){
localStorage.setItem("jogadores",JSON.stringify(jogadores));
localStorage.setItem("fila",JSON.stringify(fila));
localStorage.setItem("times",JSON.stringify(times));
}

/* carregar */
function carregar(){
jogadores=JSON.parse(localStorage.getItem("jogadores")||"[]");
fila=JSON.parse(localStorage.getItem("fila")||"[]");
times=JSON.parse(localStorage.getItem("times")||"[]");

render();
}

/* adicionar */
function add(){
let nome=document.getElementById("nome").value.trim();
let genero=document.getElementById("genero").value;
let nivel=parseInt(document.getElementById("nivel").value);

if(!nome)return alert("Digite nome");

let j={nome,genero,nivel};

jogadores.push(j);
fila.push(j);

balanceamentoGlobal();

salvar();
render();

document.getElementById("nome").value="";
}

/* ❌ REMOVER JOGADOR */
function removerJogador(nome){

// remove da lista geral
jogadores = jogadores.filter(j=>j.nome !== nome);

// remove da fila
fila = fila.filter(j=>j.nome !== nome);

// remove dos times
times.forEach(t=>{
  for(let i=t.length-1;i>=0;i--){
    if(t[i].nome === nome){
      t.splice(i,1);
    }
  }
});

// 🔥 reorganiza tudo
balanceamentoGlobal();

salvar();
render();
}

/* 🔥 MOTOR */
function balanceamentoGlobal(){

let pool=[...fila,...times.flat()];
times=[];
fila=[];

let homens=pool.filter(j=>j.genero==="M");
let mulheres=pool.filter(j=>j.genero==="F");

homens.sort((a,b)=>b.nivel-a.nivel);
mulheres.sort((a,b)=>b.nivel-a.nivel);

while(homens.length>=2 && mulheres.length>=2){

let time=[];
time.push(homens.shift());
time.push(homens.pop());
time.push(mulheres.shift());
time.push(mulheres.pop());

times.push(time);
}

fila=[...homens,...mulheres];

trocaInteligente();
validarTimes();
}

/* troca */
function trocaInteligente(){

if(times.length<2)return;

let melhorou=true;

while(melhorou){
melhorou=false;

for(let i=0;i<times.length;i++){
for(let j=i+1;j<times.length;j++){

let t1=times[i];
let t2=times[j];

for(let a=0;a<t1.length;a++){
for(let b=0;b<t2.length;b++){

if(t1[a].genero!==t2[b].genero)continue;

let before=Math.abs(soma(t1)-soma(t2));

[t1[a],t2[b]]=[t2[b],t1[a]];

let after=Math.abs(soma(t1)-soma(t2));

if(after<before){
melhorou=true;
}else{
[t1[a],t2[b]]=[t2[b],t1[a]];
}

}
}
}
}
}
}

/* valida */
function validarTimes(){
times.forEach(time=>{

let homens=time.filter(j=>j.genero==="M");
let mulheres=time.filter(j=>j.genero==="F");

while(homens.length>2){
let r=homens.pop();
time.splice(time.indexOf(r),1);
fila.push(r);
homens=time.filter(j=>j.genero==="M");
}

while(mulheres.length>2){
let r=mulheres.pop();
time.splice(time.indexOf(r),1);
fila.push(r);
mulheres=time.filter(j=>j.genero==="F");
}

});
}

/* soma */
function soma(t){
return t.reduce((a,j)=>a+j.nivel,0);
}

/* botões */
function reorganizar(){
balanceamentoGlobal();
salvar();
render();
}

function resetar(){
times=[];
fila=[...jogadores];
salvar();
render();
}

/* render */
function render(){

// lista com botão ❌
let ul=document.getElementById("lista");
ul.innerHTML="";
jogadores.forEach(j=>{
ul.innerHTML+=`
<li>
${j.nome} (${j.genero} N${j.nivel})
<button class="remove" onclick="removerJogador('${j.nome}')">❌</button>
</li>`;
});

// times
let div=document.getElementById("times");
div.innerHTML="";
times.forEach((t,i)=>{
let html=`<div class="time"><h3>Time ${i+1} (${soma(t)})</h3>`;
t.forEach(j=>html+=`<p>${j.nome}</p>`);
html+="</div>";
div.innerHTML+=html;
});

// fila
let f=document.getElementById("fila");
f.innerHTML="<h3>Fila</h3>";
fila.forEach(j=>{
f.innerHTML+=`<p>${j.nome} (${j.genero})</p>`;
});

// gráfico
grafico();
}

/* gráfico */
function grafico(){
let ctx=document.getElementById("grafico");
let dados=times.map(t=>soma(t));

if(window.grafico)window.grafico.destroy();

window.grafico=new Chart(ctx,{
type:'bar',
data:{
labels:times.map((_,i)=>"Time "+(i+1)),
datasets:[{
label:"Equilíbrio",
data:dados
}]
}
});
}

carregar();
</script>

</body>
</html>
