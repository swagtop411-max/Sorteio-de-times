<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>M&M Vôlei PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
}

/* laterais */
.lateral{
  position:fixed;
  top:0;
  height:100%;
  z-index:0;
}
.left{left:0;}
.right{right:0;}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
  text-align:center;
  position:relative;
  z-index:1;
}

.logo{font-size:32px;font-weight:bold;}

.card{
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input,select,button{
  margin:5px;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{cursor:pointer;}
.sortear{background:gold;color:black;}
.reset{background:red;color:white;}

#times{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.time{
  background:rgba(0,0,0,0.7);
  padding:10px;
  border-radius:10px;
}

.fila{
  margin-top:20px;
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<img src="MeM.jpg" class="lateral left">
<img src="MeM.jpg" class="lateral right">

<div class="container">

<div class="logo">🏐 M&M VOLEI PRO MAX</div>

<div class="card">
<input id="nome" placeholder="Nome">
<select id="genero">
<option value="M">Masculino</option>
<option value="F">Feminino</option>
</select>
<select id="nivel">
<option value="1">N1</option>
<option value="2">N2</option>
<option value="3">N3</option>
<option value="4">N4</option>
<option value="5">N5</option>
</select>
<button onclick="add()">Adicionar</button>
</div>

<div class="card">
<ul id="lista"></ul>
</div>

<button class="sortear" onclick="reorganizar()">🎮 Refazer Equilibrado</button>
<button class="reset" onclick="resetar()">Resetar</button>

<canvas id="grafico"></canvas>

<div id="times"></div>
<div id="fila" class="fila"></div>

</div>

<script>
let jogadores=[];
let fila=[];
let times=[];

/* salvar */
function salvar(){
localStorage.setItem("jogadores",JSON.stringify(jogadores));
localStorage.setItem("fila",JSON.stringify(fila));
localStorage.setItem("times",JSON.stringify(times));
}

/* carregar */
function carregar(){
jogadores=JSON.parse(localStorage.getItem("jogadores")||"[]");
fila=JSON.parse(localStorage.getItem("fila")||"[]");
times=JSON.parse(localStorage.getItem("times")||"[]");

render();
}

/* adicionar */
function add(){
let nome=document.getElementById("nome").value.trim();
let genero=document.getElementById("genero").value;
let nivel=parseInt(document.getElementById("nivel").value);

if(!nome)return alert("Digite nome");

let j={nome,genero,nivel};

jogadores.push(j);
fila.push(j);

balanceamentoGlobal();

salvar();
render();

document.getElementById("nome").value="";
}

/* 🔥 MOTOR PRINCIPAL */
function balanceamentoGlobal(){

// junta tudo
let pool=[...fila,...times.flat()];
times=[];
fila=[];

// separa
let homens=pool.filter(j=>j.genero==="M");
let mulheres=pool.filter(j=>j.genero==="F");

// ordena por nível
homens.sort((a,b)=>b.nivel-a.nivel);
mulheres.sort((a,b)=>b.nivel-a.nivel);

// cria times equilibrados
while(homens.length>=2 && mulheres.length>=2){

let time=[];

// alterna forte/fraco
time.push(homens.shift());
time.push(homens.pop());
time.push(mulheres.shift());
time.push(mulheres.pop());

times.push(time);
}

// sobra vira fila
fila=[...homens,...mulheres];

// 🔁 ajuste fino
trocaInteligente();
}

/* 🔁 troca inteligente */
function trocaInteligente(){

if(times.length<2)return;

let melhorou=true;

while(melhorou){
melhorou=false;

for(let i=0;i<times.length;i++){
for(let j=i+1;j<times.length;j++){

let t1=times[i];
let t2=times[j];

for(let a=0;a<4;a++){
for(let b=0;b<4;b++){

if(t1[a].genero!==t2[b].genero)continue;

let before=Math.abs(soma(t1)-soma(t2));

[t1[a],t2[b]]=[t2[b],t1[a]];

let after=Math.abs(soma(t1)-soma(t2));

if(after<before){
melhorou=true;
}else{
[t1[a],t2[b]]=[t2[b],t1[a]];
}

}
}
}
}
}
}

/* soma */
function soma(t){
return t.reduce((a,j)=>a+j.nivel,0);
}

/* reorganizar botão */
function reorganizar(){
balanceamentoGlobal();
salvar();
render();
}

/* reset */
function resetar(){
times=[];
fila=[...jogadores];
salvar();
render();
}

/* render */
function render(){

// lista
let ul=document.getElementById("lista");
ul.innerHTML="";
jogadores.forEach(j=>{
ul.innerHTML+=`<li>${j.nome} (${j.genero} N${j.nivel})</li>`;
});

// times
let div=document.getElementById("times");
div.innerHTML="";
times.forEach((t,i)=>{
let html=`<div class="time"><h3>Time ${i+1} (${soma(t)})</h3>`;
t.forEach(j=>html+=`<p>${j.nome}</p>`);
html+="</div>";
div.innerHTML+=html;
});

// fila
let f=document.getElementById("fila");
f.innerHTML="<h3>Fila</h3>";
fila.forEach(j=>{
f.innerHTML+=`<p>${j.nome} (${j.genero})</p>`;
});

// gráfico
desenharGrafico();
}

/* 📊 gráfico */
function desenharGrafico(){

let ctx=document.getElementById("grafico");

let dados=times.map(t=>soma(t));

if(window.grafico)window.grafico.destroy();

window.grafico=new Chart(ctx,{
type:'bar',
data:{
labels:times.map((_,i)=>"Time "+(i+1)),
datasets:[{
label:"Força do Time",
data:dados
}]
}
});
}

carregar();
</script>

</body>
</html>
