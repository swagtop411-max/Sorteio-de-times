<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>M&M Vôlei PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
  color:white;
  text-align:center;
}

/* laterais */
.lateral{
  position:fixed;
  top:0;
  height:100%;
  z-index:0;
}
.left{left:0;}
.right{right:0;}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
  position:relative;
  z-index:1;
}

.card{
  background:rgba(0,0,0,0.7);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.remove{background:red;color:white;}

.time{
  background:rgba(0,0,0,0.7);
  border-radius:10px;
  padding:10px;
}

#times{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.hidden{display:none;}

</style>
</head>

<body>

<img src="MeM.jpg" class="lateral left">
<img src="MeM.jpg" class="lateral right">

<div class="container">

<!-- 🔐 LOGIN -->
<div id="login">

<h2>🏐 M&M VOLEI</h2>

<button onclick="modoVisitante()">👤 Entrar como Visitante</button>
<button onclick="abrirLogin()">👑 Administrador</button>

<div id="senhaBox" class="hidden">
<input type="password" id="senha" placeholder="Senha">
<button onclick="loginAdm()">Entrar</button>
</div>

</div>

<!-- APP -->
<div id="app" class="hidden">

<h2>🏐 M&M VOLEI PRO</h2>

<div id="adminArea" class="card hidden">
<input id="nome" placeholder="Nome">
<select id="genero">
<option value="M">M</option>
<option value="F">F</option>
</select>
<select id="nivel">
<option value="1">N1</option>
<option value="2">N2</option>
<option value="3">N3</option>
<option value="4">N4</option>
<option value="5">N5</option>
</select>
<button onclick="add()">Adicionar</button>
</div>

<div class="card">
<ul id="lista"></ul>
</div>

<div id="adminBtns" class="hidden">
<button onclick="reorganizar()">🎮 Refazer</button>
<button onclick="corrigirTimes()">🤖 Corrigir</button>
<button onclick="resetar()">Resetar</button>
</div>

<div id="alerta"></div>
<div id="sugestao"></div>

<canvas id="grafico"></canvas>

<div id="times"></div>
<div id="fila"></div>

</div>

</div>

<script>

let modo="visitante";

function modoVisitante(){
modo="visitante";
entrarApp();
}

function abrirLogin(){
document.getElementById("senhaBox").classList.remove("hidden");
}

function loginAdm(){
let senha=document.getElementById("senha").value;
if(senha==="147580"){
modo="admin";
entrarApp();
}else{
alert("Senha incorreta");
}
}

function entrarApp(){
document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

if(modo==="admin"){
document.getElementById("adminArea").classList.remove("hidden");
document.getElementById("adminBtns").classList.remove("hidden");
}
render();
}

/* dados */
let jogadores=[];
let fila=[];
let times=[];

function salvar(){
localStorage.setItem("dados",JSON.stringify({jogadores,fila,times}));
}

function carregar(){
let d=JSON.parse(localStorage.getItem("dados")||"{}");
jogadores=d.jogadores||[];
fila=d.fila||[];
times=d.times||[];
}

/* adicionar */
function add(){
if(modo!=="admin") return;

let nome=document.getElementById("nome").value.trim();
let genero=document.getElementById("genero").value;
let nivel=parseInt(document.getElementById("nivel").value);

let j={nome,genero,nivel};

jogadores.push(j);
fila.push(j);

balancear();

salvar();
render();

document.getElementById("nome").value="";
}

/* remover */
function removerJogador(nome){
if(modo!=="admin") return;

jogadores=jogadores.filter(j=>j.nome!==nome);
fila=fila.filter(j=>j.nome!==nome);
times.forEach(t=>{
t=t.filter(j=>j.nome!==nome);
});

balancear();

salvar();
render();
}

/* balanceamento */
function balancear(){

let pool=[...fila,...times.flat()];
times=[];
fila=[];

let h=pool.filter(j=>j.genero==="M");
let m=pool.filter(j=>j.genero==="F");

while(h.length>=2 && m.length>=2){
times.push([h.pop(),h.pop(),m.pop(),m.pop()]);
}

fila=[...h,...m];
}

/* soma */
function soma(t){
return t.reduce((a,j)=>a+j.nivel,0);
}

/* render */
function render(){

let ul=document.getElementById("lista");
ul.innerHTML="";

jogadores.forEach(j=>{
ul.innerHTML+=`
<li>
${j.nome} (${j.genero} N${j.nivel})
${modo==="admin" ? `<button class="remove" onclick="removerJogador('${j.nome}')">❌</button>` : ""}
</li>`;
});

let div=document.getElementById("times");
div.innerHTML="";

times.forEach((t,i)=>{
div.innerHTML+=`
<div class="time">
<h3>Time ${i+1} (${soma(t)})</h3>
${t.map(j=>`<p>${j.nome}</p>`).join("")}
</div>`;
});

let f=document.getElementById("fila");
f.innerHTML="<h3>Fila</h3>";
fila.forEach(j=>{
f.innerHTML+=`<p>${j.nome}</p>`;
});

grafico();
}

/* gráfico */
function grafico(){
let ctx=document.getElementById("grafico");
let dados=times.map(t=>soma(t));

if(window.grafico)window.grafico.destroy();

window.grafico=new Chart(ctx,{
type:'bar',
data:{
labels:times.map((_,i)=>"Time "+(i+1)),
datasets:[{data:dados}]
}
});
}

/* botões */
function reorganizar(){balancear();salvar();render();}
function corrigirTimes(){balancear();salvar();render();}
function resetar(){times=[];fila=[...jogadores];salvar();render();}

carregar();

</script>

</body>
</html>
