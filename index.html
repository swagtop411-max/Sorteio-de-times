<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>M&M Vôlei PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: linear-gradient(135deg, #020617, #0f172a, #1e3a8a);
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

.card {
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select, button {
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button { cursor: pointer; }

#times {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.time {
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 10px;
}

.fila {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🏐 M&M VOLEI PRO</h2>

<div class="card">
  <input id="nome" placeholder="Nome">
  <select id="genero">
    <option value="M">Masculino</option>
    <option value="F">Feminino</option>
  </select>
  <select id="nivel">
    <option value="1">N1</option>
    <option value="2">N2</option>
    <option value="3">N3</option>
    <option value="4">N4</option>
    <option value="5">N5</option>
  </select>
  <button onclick="add()">Adicionar</button>
</div>

<div class="card">
  <h3>Jogadores</h3>
  <ul id="lista"></ul>
</div>

<button onclick="sortear()">Sortear Balanceado</button>
<button onclick="resetar()">Resetar</button>

<div id="times"></div>
<div id="fila" class="fila"></div>

</div>

<script>
let jogadores = [];
let fila = [];
let times = [];

function salvar(){
  localStorage.setItem("jogadores", JSON.stringify(jogadores));
  localStorage.setItem("fila", JSON.stringify(fila));
  localStorage.setItem("times", JSON.stringify(times));
}

function carregar(){
  jogadores = JSON.parse(localStorage.getItem("jogadores") || "[]");
  fila = JSON.parse(localStorage.getItem("fila") || "[]");
  times = JSON.parse(localStorage.getItem("times") || "[]");

  renderLista();
  renderTimes();
  renderFila();
}

/* adicionar */
function add(){
  const nome = nomeInput();
  const genero = document.getElementById("genero").value;
  const nivel = parseInt(document.getElementById("nivel").value);

  if(!nome) return alert("Digite o nome");

  let j = {nome, genero, nivel};

  jogadores.push(j);
  fila.push(j);

  tentarFormarTimeBalanceado();
  salvar();

  document.getElementById("nome").value="";
  renderLista();
}

function nomeInput(){
  return document.getElementById("nome").value.trim();
}

/* 🧠 FORMAR TIME BALANCEADO */
function tentarFormarTimeBalanceado(){

  let homens = fila.filter(j=>j.genero==="M");
  let mulheres = fila.filter(j=>j.genero==="F");

  if(homens.length < 2 || mulheres.length < 2) return;

  let melhor = null;
  let melhorScore = Infinity;

  // tenta várias combinações
  for(let t=0; t<200; t++){
    let h = [...homens].sort(()=>Math.random()-0.5);
    let m = [...mulheres].sort(()=>Math.random()-0.5);

    let time = [h[0],h[1],m[0],m[1]];
    let score = time.reduce((a,j)=>a+j.nivel,0);

    if(score < melhorScore){
      melhorScore = score;
      melhor = time;
    }
  }

  // remove da fila
  melhor.forEach(j=>{
    fila.splice(fila.indexOf(j),1);
  });

  times.push(melhor);

  balancearTimes(); // 🔥 troca inteligente
}

/* 🔁 TROCA INTELIGENTE */
function balancearTimes(){
  if(times.length < 2) return;

  let melhorou = true;

  while(melhorou){
    melhorou = false;

    for(let i=0;i<times.length;i++){
      for(let j=i+1;j<times.length;j++){

        let t1 = times[i];
        let t2 = times[j];

        let soma1 = soma(t1);
        let soma2 = soma(t2);

        // tenta trocar jogadores
        for(let a=0;a<4;a++){
          for(let b=0;b<4;b++){

            if(t1[a].genero !== t2[b].genero) continue;

            // troca
            let temp = t1[a];
            t1[a] = t2[b];
            t2[b] = temp;

            let novaDif = Math.abs(soma(t1) - soma(t2));
            let antigaDif = Math.abs(soma1 - soma2);

            if(novaDif < antigaDif){
              melhorou = true;
            } else {
              // desfaz
              temp = t1[a];
              t1[a] = t2[b];
              t2[b] = temp;
            }
          }
        }
      }
    }
  }

  renderTimes();
}

/* soma */
function soma(time){
  return time.reduce((a,j)=>a+j.nivel,0);
}

/* sorteio geral */
function sortear(){
  fila = [...jogadores];
  times = [];

  while(true){
    let antes = times.length;
    tentarFormarTimeBalanceado();
    if(times.length === antes) break;
  }

  salvar();
  renderTimes();
  renderFila();
}

/* reset */
function resetar(){
  times = [];
  fila = [...jogadores];
  salvar();
  renderTimes();
  renderFila();
}

/* render */
function renderLista(){
  const ul = document.getElementById("lista");
  ul.innerHTML="";
  jogadores.forEach((j,i)=>{
    ul.innerHTML += `<li>${j.nome} (${j.genero} N${j.nivel})</li>`;
  });
}

function renderTimes(){
  const div = document.getElementById("times");
  div.innerHTML="";

  times.forEach((t,i)=>{
    let total = soma(t);

    let html = `<div class="time"><h3>Time ${i+1} (${total})</h3>`;
    t.forEach(j=>{
      html += `<p>${j.nome} N${j.nivel}</p>`;
    });
    html += "</div>";

    div.innerHTML += html;
  });
}

function renderFila(){
  const div = document.getElementById("fila");

  div.innerHTML="<h3>Fila</h3>";
  fila.forEach(j=>{
    div.innerHTML += `<p>${j.nome} (${j.genero})</p>`;
  });
}

carregar();
</script>

</body>
</html>
