<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>M&M Sorteio de Times</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
}

/* FUNDO */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background:
    linear-gradient(rgba(2,6,23,0.75), rgba(2,6,23,0.95)),
    url("MeM.jpg");

  background-repeat: no-repeat;
  background-position: center;
  background-size: auto 100%;

  background-color: #020617;

  z-index: -1;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

.logo {
  font-size: 30px;
  font-weight: bold;
  color: #22c55e;
}

.subtitulo {
  margin-bottom: 20px;
  color: #cbd5f5;
}

.card {
  background: rgba(15, 23, 42, 0.85);
  border: 2px solid #22c55e;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select, button {
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

input, select {
  width: 200px;
}

button {
  cursor: pointer;
  background: #22c55e;
  color: white;
  font-weight: bold;
}

button:hover {
  background: #16a34a;
}

.sortear {
  background: #eab308;
  color: black;
}

.reset {
  background: #ef4444;
}

.reset:hover {
  background: #dc2626;
}

#times {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.time {
  background: rgba(30,41,59,0.95);
  padding: 10px;
  border-radius: 10px;
  border-left: 5px solid #22c55e;
}

li button {
  margin-left: 10px;
  background: #ef4444;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🏐 M&M VOLEI</div>
<div class="subtitulo">Sistema Inteligente de Sorteio</div>

<div class="card">
  <input type="text" id="nome" placeholder="Nome do jogador">

  <select id="genero">
    <option value="M">👨 Masculino</option>
    <option value="F">👩 Feminino</option>
  </select>

  <select id="nivel">
    <option value="1">Nível 1</option>
    <option value="2">Nível 2</option>
    <option value="3">Nível 3</option>
    <option value="4">Nível 4</option>
    <option value="5">Nível 5</option>
  </select>

  <br>
  <button onclick="adicionarJogador()">+ Adicionar</button>
</div>

<div class="card">
  <h2>👥 Jogadores</h2>
  <ul id="lista"></ul>
</div>

<button class="sortear" onclick="sortearTimes()">🎯 Sortear Times</button>
<button class="reset" onclick="resetarTimes()">🔄 Resetar Times</button>

<div id="times"></div>

</div>

<script>
let jogadores = [];

// salvar
function salvarJogadores() {
  localStorage.setItem("jogadores", JSON.stringify(jogadores));
}

// carregar
function carregarJogadores() {
  const dados = localStorage.getItem("jogadores");
  if (dados) {
    jogadores = JSON.parse(dados);
    atualizarLista();
  }
}

// adicionar
function adicionarJogador() {
  const nomeInput = document.getElementById("nome");
  const genero = document.getElementById("genero").value;
  const nivel = parseInt(document.getElementById("nivel").value);

  const nome = nomeInput.value.trim();
  if (!nome) return alert("Digite o nome!");

  jogadores.push({ nome, genero, nivel });

  atualizarLista();
  salvarJogadores();

  nomeInput.value = "";
  nomeInput.focus();
}

// lista
function atualizarLista() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  jogadores.forEach((j, i) => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${j.nome} - ${j.genero} - Nível ${j.nivel}
      <button onclick="removerJogador(${i})">❌</button>
    `;
    lista.appendChild(li);
  });
}

// remover
function removerJogador(i) {
  jogadores.splice(i, 1);
  atualizarLista();
  salvarJogadores();
}

// 🔄 RESETAR TIMES (SEM APAGAR JOGADORES)
function resetarTimes() {
  document.getElementById("times").innerHTML = "";
}

// 🧠 SORTEIO COM SOBRAS
function sortearTimes() {
  let homens = jogadores.filter(j => j.genero === "M");
  let mulheres = jogadores.filter(j => j.genero === "F");

  let times = [];

  // embaralhar
  homens.sort(() => Math.random() - 0.5);
  mulheres.sort(() => Math.random() - 0.5);

  // enquanto tiver jogadores
  while (homens.length > 0 || mulheres.length > 0) {
    let time = [];

    // pega até 2 homens
    for (let i = 0; i < 2 && homens.length > 0; i++) {
      time.push(homens.pop());
    }

    // pega até 2 mulheres
    for (let i = 0; i < 2 && mulheres.length > 0; i++) {
      time.push(mulheres.pop());
    }

    // se ainda tiver espaço, completa com quem sobrou
    while (time.length < 4 && (homens.length > 0 || mulheres.length > 0)) {
      if (homens.length > 0) {
        time.push(homens.pop());
      } else if (mulheres.length > 0) {
        time.push(mulheres.pop());
      }
    }

    times.push(time);
  }

  mostrarTimes(times);
}

// mostrar
function mostrarTimes(times) {
  const div = document.getElementById("times");
  div.innerHTML = "";

  times.forEach((time,i)=>{
    let html = `<div class="time"><h3>Time ${i+1}</h3>`;

    time.forEach(j=>{
      html += `<p>${j.nome} (N${j.nivel})</p>`;
    });

    html += `</div>`;
    div.innerHTML += html;
  });
}

carregarJogadores();
</script>

</body>
</html>
