<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>M&M Vôlei PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
}

.lateral{
  position:fixed;
  top:0;
  height:100%;
  z-index:0;
}
.left{left:0;}
.right{right:0;}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
  text-align:center;
  position:relative;
  z-index:1;
}

.card{
  background:rgba(0,0,0,0.75);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input,select,button{
  margin:5px;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{cursor:pointer;}

.remove{
  background:#ef4444;
  color:white;
  margin-left:10px;
}

.time{
  background:rgba(0,0,0,0.75);
  padding:10px;
  border-radius:10px;
}

#times{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.fila{
  margin-top:20px;
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
}

h3{color:#facc15;}

</style>
</head>

<body>

<img src="MeM.jpg" class="lateral left">
<img src="MeM.jpg" class="lateral right">

<div class="container">

<h2>🏐 M&M VOLEI PRO MAX</h2>

<div class="card">
<input id="nome" placeholder="Nome">
<select id="genero">
<option value="M">Masculino</option>
<option value="F">Feminino</option>
</select>
<select id="nivel">
<option value="1">N1</option>
<option value="2">N2</option>
<option value="3">N3</option>
<option value="4">N4</option>
<option value="5">N5</option>
</select>
<button onclick="add()">Adicionar</button>
</div>

<div class="card">
<ul id="lista"></ul>
</div>

<button onclick="reorganizar()">🎮 Refazer Equilibrado</button>
<button onclick="corrigirTimes()">🤖 Corrigir</button>
<button onclick="resetar()">Resetar</button>

<div id="alerta"></div>
<div id="sugestao"></div>

<canvas id="grafico"></canvas>

<div id="times"></div>
<div id="fila" class="fila"></div>

</div>

<script>

let jogadores=[];
let fila=[];
let times=[];

function salvar(){
localStorage.setItem("jogadores",JSON.stringify(jogadores));
localStorage.setItem("fila",JSON.stringify(fila));
localStorage.setItem("times",JSON.stringify(times));
}

function carregar(){
jogadores=JSON.parse(localStorage.getItem("jogadores")||"[]");
fila=JSON.parse(localStorage.getItem("fila")||"[]");
times=JSON.parse(localStorage.getItem("times")||"[]");
render();
}

function add(){
let nome=nomeInput();
let genero=document.getElementById("genero").value;
let nivel=parseInt(document.getElementById("nivel").value);

if(!nome)return alert("Digite nome");

let j={nome,genero,nivel};

jogadores.push(j);
fila.push(j);

balanceamentoGlobal();

salvar();
render();

document.getElementById("nome").value="";
}

function nomeInput(){
return document.getElementById("nome").value.trim();
}

function removerJogador(nome){

jogadores=jogadores.filter(j=>j.nome!==nome);
fila=fila.filter(j=>j.nome!==nome);

times.forEach(t=>{
for(let i=t.length-1;i>=0;i--){
if(t[i].nome===nome) t.splice(i,1);
}
});

balanceamentoGlobal();

salvar();
render();
}

function balanceamentoGlobal(){

let pool=[...fila,...times.flat()];
times=[];
fila=[];

let homens=pool.filter(j=>j.genero==="M");
let mulheres=pool.filter(j=>j.genero==="F");

homens.sort((a,b)=>b.nivel-a.nivel);
mulheres.sort((a,b)=>b.nivel-a.nivel);

while(homens.length>=2 && mulheres.length>=2){

let time=[
homens.shift(),
homens.pop(),
mulheres.shift(),
mulheres.pop()
];

times.push(time);
}

fila=[...homens,...mulheres];

trocaInteligente();
validarTimes();
}

function trocaInteligente(){

if(times.length<2)return;

let melhorou=true;

while(melhorou){
melhorou=false;

for(let i=0;i<times.length;i++){
for(let j=i+1;j<times.length;j++){

let t1=times[i];
let t2=times[j];

for(let a=0;a<t1.length;a++){
for(let b=0;b<t2.length;b++){

if(t1[a].genero!==t2[b].genero)continue;

let before=Math.abs(soma(t1)-soma(t2));

[t1[a],t2[b]]=[t2[b],t1[a]];

let after=Math.abs(soma(t1)-soma(t2));

if(after<before){
melhorou=true;
}else{
[t1[a],t2[b]]=[t2[b],t1[a]];
}

}
}
}
}
}
}

function validarTimes(){

times.forEach(time=>{

let homens=time.filter(j=>j.genero==="M");
let mulheres=time.filter(j=>j.genero==="F");

while(homens.length>2){
let r=homens.pop();
time.splice(time.indexOf(r),1);
fila.push(r);
homens=time.filter(j=>j.genero==="M");
}

while(mulheres.length>2){
let r=mulheres.pop();
time.splice(time.indexOf(r),1);
fila.push(r);
mulheres=time.filter(j=>j.genero==="F");
}

});
}

function soma(t){
return t.reduce((a,j)=>a+j.nivel,0);
}

function reorganizar(){
balanceamentoGlobal();
salvar();
render();
}

function resetar(){
times=[];
fila=[...jogadores];
salvar();
render();
}

/* 🎯 sugestão */
function sugerirTroca(){

let melhor=null;
let ganhoMax=0;

for(let i=0;i<times.length;i++){
for(let j=i+1;j<times.length;j++){

let t1=times[i];
let t2=times[j];

for(let a=0;a<t1.length;a++){
for(let b=0;b<t2.length;b++){

if(t1[a].genero!==t2[b].genero)continue;

let before=Math.abs(soma(t1)-soma(t2));

[t1[a],t2[b]]=[t2[b],t1[a]];

let after=Math.abs(soma(t1)-soma(t2));

[t1[a],t2[b]]=[t2[b],t1[a]];

let ganho=before-after;

if(ganho>ganhoMax){
ganhoMax=ganho;
melhor={i,j,a,b};
}

}
}
}
}

if(!melhor){
document.getElementById("sugestao").innerHTML="✅ Já equilibrado";
return null;
}

let t1=times[melhor.i];
let t2=times[melhor.j];

document.getElementById("sugestao").innerHTML=
`🎯 Trocar ${t1[melhor.a].nome} por ${t2[melhor.b].nome}`;

return melhor;
}

/* 🤖 corrigir */
function corrigirTimes(){

let troca=sugerirTroca();
if(!troca)return;

let t1=times[troca.i];
let t2=times[troca.j];

[t1[troca.a],t2[troca.b]]=[t2[troca.b],t1[troca.a]];

validarTimes();
trocaInteligente();

salvar();
render();
}

/* render */
function render(){

let ul=document.getElementById("lista");
ul.innerHTML="";
jogadores.forEach(j=>{
ul.innerHTML+=`<li>${j.nome} (${j.genero} N${j.nivel})
<button class="remove" onclick="removerJogador('${j.nome}')">❌</button>
</li>`;
});

let niveis=times.map(t=>soma(t));
let diff=Math.max(...niveis,0)-Math.min(...niveis,0);

let alerta=document.getElementById("alerta");

if(diff<=2){
alerta.innerHTML="✅ Equilibrado";
alerta.style.color="#22c55e";
}else if(diff<=5){
alerta.innerHTML="⚠️ Médio";
alerta.style.color="#facc15";
}else{
alerta.innerHTML="🚨 Desbalanceado";
alerta.style.color="#ef4444";
}

let div=document.getElementById("times");
div.innerHTML="";

times.forEach((t,i)=>{

let total=soma(t);
let media=(total/t.length).toFixed(1);

let cor = diff<=2 ? "#22c55e" : diff<=5 ? "#facc15" : "#ef4444";

let html=`<div class="time" style="border:3px solid ${cor}">
<h3>🏐 Time ${i+1}</h3>
<p>🔥 Nível ${total} | Média ${media}</p>`;

t.forEach(j=>html+=`<p>${j.nome} (N${j.nivel})</p>`);

html+="</div>";

div.innerHTML+=html;
});

let f=document.getElementById("fila");
f.innerHTML="<h3>Fila</h3>";
fila.forEach(j=>f.innerHTML+=`<p>${j.nome}</p>`);

grafico();
sugerirTroca();
}

function grafico(){

let ctx=document.getElementById("grafico");
let dados=times.map(t=>soma(t));

if(window.grafico)window.grafico.destroy();

window.grafico=new Chart(ctx,{
type:'bar',
data:{
labels:times.map((_,i)=>"Time "+(i+1)),
datasets:[{label:"Força",data:dados}]
}
});
}

carregar();

</script>

</body>
</html>
