<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>M&M SISTEMA DE SORTEIO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: linear-gradient(135deg, #020617, #0f172a, #1e3a8a);
}

/* laterais */
.lateral {
  position: fixed;
  top: 0;
  height: 100%;
  z-index: 0;
}

.lateral.left { left: 0; }
.lateral.right { right: 0; }

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
  position: relative;
  z-index: 1;
}

.logo {
  font-size: 34px;
  font-weight: bold;
}

/* bola */
.bola {
  font-size: 40px;
  animation: quicar 1s infinite;
}

@keyframes quicar {
  50% { transform: translateY(-15px); }
}

.card {
  background: rgba(0,0,0,0.6);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select, button {
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button { cursor: pointer; }

.sortear { background: gold; color: black; }
.reset { background: red; color: white; }

#times {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.time {
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 10px;
}

.ranking {
  margin-top: 20px;
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<img src="MeM.jpg" class="lateral left">
<img src="MeM.jpg" class="lateral right">

<div class="container">

<div class="logo">🏐 SISTEMA INTELIGENTE DE SORTEIO DE TIMES 🏐</div>
<div class="bola">🏐</div>

<div class="card">
  <input type="text" id="nome" placeholder="Nome do jogador">

  <select id="genero">
    <option value="M">Masculino</option>
    <option value="F">Feminino</option>
  </select>

  <select id="nivel">
    <option value="1">Nível 1</option>
    <option value="2">Nível 2</option>
    <option value="3">Nível 3</option>
    <option value="4">Nível 4</option>
    <option value="5">Nível 5</option>
  </select>

  <br>
  <button onclick="adicionarJogador()">+ Adicionar</button>
</div>

<div class="card">
  <h2>Jogadores</h2>
  <ul id="lista"></ul>
</div>

<button class="sortear" onclick="sortearTimes()">Sortear</button>
<button class="reset" onclick="resetarTimes()">Resetar</button>

<div id="times"></div>
<div id="ranking" class="ranking"></div>

</div>

<script>
let jogadores = [];
let timesSalvos = [];

// salvar jogadores
function salvarJogadores(){
  localStorage.setItem("jogadores", JSON.stringify(jogadores));
}

// salvar times
function salvarTimes(){
  localStorage.setItem("times", JSON.stringify(timesSalvos));
}

// carregar tudo
function carregarDados(){
  const j = localStorage.getItem("jogadores");
  const t = localStorage.getItem("times");

  if(j) jogadores = JSON.parse(j);
  if(t) timesSalvos = JSON.parse(t);

  atualizarLista();

  if(timesSalvos.length > 0){
    mostrarTimes(timesSalvos);
    gerarRanking(timesSalvos);
  }
}

// adicionar
function adicionarJogador(){
  const nome = document.getElementById("nome").value.trim();
  const genero = document.getElementById("genero").value;
  const nivel = parseInt(document.getElementById("nivel").value);

  if(!nome) return alert("Digite o nome!");

  jogadores.push({nome, genero, nivel});
  atualizarLista();
  salvarJogadores();

  document.getElementById("nome").value="";
}

// lista
function atualizarLista(){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  jogadores.forEach((j,i)=>{
    const li = document.createElement("li");
    li.innerHTML = `${j.nome} (N${j.nivel})
    <button onclick="removerJogador(${i})">❌</button>`;
    lista.appendChild(li);
  });
}

// remover
function removerJogador(i){
  jogadores.splice(i,1);
  atualizarLista();
  salvarJogadores();
}

// reset
function resetarTimes(){
  timesSalvos = [];
  localStorage.removeItem("times");

  document.getElementById("times").innerHTML="";
  document.getElementById("ranking").innerHTML="";
}

// sorteio
function sortearTimes(){
  let homens = jogadores.filter(j=>j.genero==="M");
  let mulheres = jogadores.filter(j=>j.genero==="F");

  let times = [];

  homens.sort(()=>Math.random()-0.5);
  mulheres.sort(()=>Math.random()-0.5);

  while(homens.length || mulheres.length){
    let time=[];

    for(let i=0;i<2 && homens.length;i++) time.push(homens.pop());
    for(let i=0;i<2 && mulheres.length;i++) time.push(mulheres.pop());

    while(time.length<4 && (homens.length || mulheres.length)){
      if(homens.length) time.push(homens.pop());
      else time.push(mulheres.pop());
    }

    times.push(time);
  }

  timesSalvos = times;
  salvarTimes();

  mostrarTimes(times);
  gerarRanking(times);
}

// mostrar
function mostrarTimes(times){
  const div = document.getElementById("times");
  div.innerHTML="";

  times.forEach((time,i)=>{
    let html = `<div class="time"><h3>Time ${i+1}</h3>`;
    time.forEach(j=>{
      html += `<p>${j.nome} (N${j.nivel})</p>`;
    });
    html += `</div>`;
    div.innerHTML += html;
  });
}

// ranking
function gerarRanking(times){
  let ranking=[];

  times.forEach((time,i)=>{
    let total = time.reduce((a,j)=>a+j.nivel,0);
    ranking.push({time:i+1, pontos:total});
  });

  ranking.sort((a,b)=>b.pontos-a.pontos);

  const div = document.getElementById("ranking");
  div.innerHTML="<h3>Ranking</h3>";

  ranking.forEach((r,i)=>{
    div.innerHTML+=`<p>${i+1}º - Time ${r.time} (${r.pontos})</p>`;
  });
}

carregarDados();
</script>

</body>
</html>
