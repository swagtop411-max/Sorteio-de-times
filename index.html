<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>M&M Sorteio de Times</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
}

/* 🔥 FUNDO COM NOVA IMAGEM */
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background:
    linear-gradient(rgba(2,6,23,0.75), rgba(2,6,23,0.95)),
    url("MeM.jpg");

  background-repeat: no-repeat;
  background-position: center;
  background-size: auto 100%; /* 🔥 mantém imagem inteira */

  background-color: #020617;

  z-index: -1;
}

/* container */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

/* logo */
.logo {
  font-size: 30px;
  font-weight: bold;
  color: #22c55e;
}

.subtitulo {
  margin-bottom: 20px;
  color: #cbd5f5;
}

/* cards */
.card {
  background: rgba(15, 23, 42, 0.85);
  border: 2px solid #22c55e;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

/* inputs */
input, select, button {
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

input, select {
  width: 200px;
}

/* botões */
button {
  cursor: pointer;
  background: #22c55e;
  color: white;
  font-weight: bold;
}

button:hover {
  background: #16a34a;
}

/* botão sorteio */
.sortear {
  margin: 20px;
  font-size: 18px;
  padding: 12px 20px;
  background: #eab308;
  color: black;
}

/* times */
#times {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.time {
  background: rgba(30,41,59,0.95);
  padding: 10px;
  border-radius: 10px;
  border-left: 5px solid #22c55e;
}

/* lista */
li {
  margin: 5px 0;
}

li button {
  margin-left: 10px;
  background: #ef4444;
}

li button:hover {
  background: #dc2626;
}

/* responsivo */
@media (max-width: 600px) {
  input, select {
    width: 90%;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🏐 M&M VOLEI</div>
<div class="subtitulo">Sistema Inteligente de Sorteio</div>

<!-- CADASTRO -->
<div class="card">
  <input type="text" id="nome" placeholder="Nome do jogador">

  <select id="genero">
    <option value="M">👨 Masculino</option>
    <option value="F">👩 Feminino</option>
  </select>

  <select id="nivel">
    <option value="1">Nível 1</option>
    <option value="2">Nível 2</option>
    <option value="3">Nível 3</option>
    <option value="4">Nível 4</option>
    <option value="5">Nível 5</option>
  </select>

  <br>
  <button onclick="adicionarJogador()">+ Adicionar</button>
</div>

<!-- LISTA -->
<div class="card">
  <h2>👥 Jogadores</h2>
  <ul id="lista"></ul>
</div>

<button class="sortear" onclick="sortearTimes()">🎯 Sortear Times</button>

<div id="times"></div>

</div>

<script>
let jogadores = [];

// salvar
function salvarJogadores() {
  localStorage.setItem("jogadores", JSON.stringify(jogadores));
}

// carregar
function carregarJogadores() {
  const dados = localStorage.getItem("jogadores");
  if (dados) {
    jogadores = JSON.parse(dados);
    atualizarLista();
  }
}

// adicionar
function adicionarJogador() {
  const nomeInput = document.getElementById("nome");
  const genero = document.getElementById("genero").value;
  const nivel = parseInt(document.getElementById("nivel").value);

  const nome = nomeInput.value.trim();
  if (!nome) return alert("Digite o nome!");

  jogadores.push({ nome, genero, nivel });

  atualizarLista();
  salvarJogadores();

  nomeInput.value = "";
  nomeInput.focus();
}

// lista
function atualizarLista() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  jogadores.forEach((j, i) => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${j.nome} - ${j.genero} - Nível ${j.nivel}
      <button onclick="removerJogador(${i})">❌</button>
    `;
    lista.appendChild(li);
  });
}

// remover
function removerJogador(i) {
  jogadores.splice(i, 1);
  atualizarLista();
  salvarJogadores();
}

// algoritmo PRO
function sortearTimes() {
  let homens = jogadores.filter(j => j.genero === "M");
  let mulheres = jogadores.filter(j => j.genero === "F");

  if (homens.length < 2 || mulheres.length < 2) {
    alert("Precisa de 2 homens e 2 mulheres!");
    return;
  }

  const totalTimes = Math.floor(Math.min(homens.length/2, mulheres.length/2));

  let melhor = null;
  let menorDif = Infinity;

  for (let t = 0; t < 300; t++) {
    let h = [...homens].sort(() => Math.random() - 0.5);
    let m = [...mulheres].sort(() => Math.random() - 0.5);

    let times = Array.from({length: totalTimes}, () => []);

    for (let i = 0; i < totalTimes; i++) {
      times[i].push(h.pop(), h.pop(), m.pop(), m.pop());
    }

    let medias = times.map(t => t.reduce((a,j)=>a+j.nivel,0));
    let dif = Math.max(...medias) - Math.min(...medias);

    if (dif < menorDif) {
      menorDif = dif;
      melhor = times;
    }
  }

  mostrarTimes(melhor);
}

// mostrar
function mostrarTimes(times) {
  const div = document.getElementById("times");
  div.innerHTML = "";

  times.forEach((time,i)=>{
    let html = `<div class="time"><h3>Time ${i+1}</h3>`;
    time.forEach(j=>{
      html += `<p>${j.nome} (N${j.nivel})</p>`;
    });
    html += `<strong>Média: ${time.reduce((a,j)=>a+j.nivel,0)}</strong></div>`;
    div.innerHTML += html;
  });
}

carregarJogadores();
</script>

</body>
</html>
